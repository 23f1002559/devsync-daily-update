name: DevSync Daily Repository Update

on:
  schedule:
    - cron: '15 3 * * *'   # Runs every day at 03:15 UTC (specific time)
  workflow_dispatch:      # Allows manual trigger

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "DevSync Automation"
          git config --global user.email "23f1002559@ds.study.iitm.ac.in"

      - name: Daily commit by 23f1002559@ds.study.iitm.ac.in
        run: |
          echo "Automated update on $(date -u)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push
